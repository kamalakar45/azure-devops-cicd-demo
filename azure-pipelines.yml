trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "18.x"
  NPM_CACHE_FOLDER: "$(Pipeline.Workspace)/.npm"

stages:
  - stage: CI
    displayName: "CI"
    jobs:
      - job: Build
        displayName: "Build"
        steps:
          - task: NodeTool@0
            displayName: "Use Node.js $(NODE_VERSION)"
            inputs:
              versionSpec: "$(NODE_VERSION)"

          - task: Cache@2
            displayName: "Restore npm cache"
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(NPM_CACHE_FOLDER)

          - script: |
              npm config set cache "$(NPM_CACHE_FOLDER)" --global
              npm ci
            displayName: "Install dependencies (npm ci)"

          - script: |
              echo "Building application"
              # npm run build
            displayName: "Build application"

      - job: Test
        displayName: "Test"
        dependsOn: Build
        steps:
          - task: NodeTool@0
            displayName: "Use Node.js $(NODE_VERSION)"
            inputs:
              versionSpec: "$(NODE_VERSION)"

          - task: Cache@2
            displayName: "Restore npm cache"
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(NPM_CACHE_FOLDER)

          - script: |
              npm config set cache "$(NPM_CACHE_FOLDER)" --global
              npm ci
            displayName: "Install dependencies (npm ci)"

          - script: npm test
            displayName: "Run unit tests"

          - script: npm run lint
            displayName: "Run lint checks"

  - stage: Deploy
    displayName: "Deploy"
    dependsOn: CI
    condition: succeeded()
    jobs:
      - job: Deploy
        displayName: "Deploy"
        steps:
          - script: echo "Deploying application"
            displayName: "Mock deploy"

